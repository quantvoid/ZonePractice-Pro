          LORE:
            FORMAT: "<gold>%number%. <gray>| <yellow>%player%<dark_gray>: <white>%ladder_win%"
            FORMAT-NULL: "<gold>%number%. <gray>| <red>N/A"
            LEADERBOARD:
              - "<dark_gray><st>------------------------"
