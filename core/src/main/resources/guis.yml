VERSION: 37

GENERAL-FILLER-ITEM:
  NAME: " "
  MATERIAL: BLACK_STAINED_GLASS_PANE
GUIS:
  ARENA-CREATE:
    TITLE: "<gold>What type for <red>%arena%<gold>?"
  LADDER-CREATE:
    TITLE: "<gold>What type for <red>%ladder%<gold>?"
  VALIDATION-GUI:
    TITLE: "<dark_gray>Validation"
    ICONS:
      CANCEL:
        NAME: "<red>Cancel"
        MATERIAL: RED_STAINED_GLASS_PANE
      APPROVE:
        NAME: "<green>Approve"
        MATERIAL: LIME_STAINED_GLASS_PANE
  KIT-EDITOR: # %ladder% display the Display Name of the ladder (official icon name), but you can also use %ladderOriginal% which is the given name of the ladder.
    EDITOR-MENU:
      TITLE: "<gold><bold>Select what to edit"
      ICONS:
        FILLER-ITEM:
          MATERIAL: BLACK_STAINED_GLASS_PANE
        PREMADE-LADDER:
          NAME: "<gold><bold>Premade Ladder"
          MATERIAL: GOLDEN_SWORD
          LORE:
            - "<dark_gray><st>------------------------"
            - "<gray>Click here to edit a <gold>premade"
            - "<gray>ladder."
            - "<dark_gray><st>------------------------"
        PLAYER-LADDER:
          NAME: "<green><bold>Own Ladder"
          MATERIAL: FIRE_CHARGE
          LORE:
            - "<dark_gray><st>------------------------"
            - "<gray>Click here to edit your <green>own"
            - "<gray>ladder."
            - "<dark_gray><st>------------------------"
    PLAYER-CUSTOM-KIT-SELECTOR:
      TITLE: "<dark_gray>Select a kit to edit"
      ICONS:
        KIT:
          NAME: "<gray>[<white>%kit%<gray>]"
          MATERIAL: WRITABLE_BOOK
        UNSELECTED:
          NAME: "<gray>[<white>Unselected<gray>]"
          MATERIAL: CYAN_TERRACOTTA
        SELECTED:
          NAME: "<gray>[<green>Selected<gray>]"
          MATERIAL: LIME_TERRACOTTA
        GUIDE:
          NAME: "<aqua>Guide"
          MATERIAL: PAPER
          LORE:
            - "<white>After selecting a kit, you can"
            - "<white>play with it by dueling other"
            - "<white>players or play in parties."
    LADDER-SELECTOR:
      TITLE: "<blue><bold>Select a kit to edit."
      ICONS:
        NAME: "%ladder%"
        LORE:
          - ""
          - "<green>Click here to select <yellow>%ladder%<green>."
    DUEL-ROUND-SELECTOR:
      TITLE: "<dark_gray>Select the amount of rounds"
      ICONS:
        BACK-TO:
          NAME: "<red>Back to"
          MATERIAL: ARROW
        ROUND-SELECTOR:
          NAME: "<gray>Rounds: <gold>%rounds%"
          MATERIAL: FIREWORK_STAR
          LORE:
            - ""
            - "<gray>The first player/team to reach"
            - "<gray>the, winning rounds wins."
            - ""
            - "<gray>Recommended: <yellow>%recommended_rounds% rounds<gray>."
            - ""
            - "<green><bold>LEFT-CLICK <green>to reduce the rounds."
            - "<aqua><bold>RIGHT-CLICK <aqua>to increase the rounds."
        SHOW-ARENA:
          NAME: "<yellow>Selected Arena: %arena%"
          MATERIAL: DIRT # In case the arena doesn't have an icon
          LORE:
            - ""
            - "<gray>You've selected this arena for the match."
        SHOW-LADDER:
          NAME: "<yellow>Selected Ladder: %ladder%"
          MATERIAL: DIRT # In case the ladder doesn't have an icon
          LORE:
            - ""
            - "<gray>You've selected this ladder for the match."
        START-MATCH:
          NAME: "<green>Start Match"
          MATERIAL: EMERALD
          LORE:
            - ""
            - "<gray>Click here to start the match."
            - "<gray>The match will start with the selected"
            - "<gray>arena and ladder."
    KIT-SELECTOR:
      TITLE: "<dark_gray>Viewing %ladder% kits"
      ICONS:
        BACK-TO-KIT-SELECTOR:
          NAME: "<red>Back to kit selector"
          MATERIAL: ARROW
        CREATE-KIT:
          NAME: "<green><bold>Create Kit"
          MATERIAL: STONE_SWORD
        EXISTING-KIT:
          NAME: "<gold><bold>Kit %kit%"
          MATERIAL: GOLDEN_SWORD
        EDIT-KIT:
          NAME: "<green><bold>Edit Kit"
          MATERIAL: BOOK
        DELETE-KIT:
          NAME: "<red><bold>Delete Kit"
          MATERIAL: REDSTONE
          LORE:
            - "<dark_gray><st>------------------------"
            - "<red><bold>You won't be able to"
            - "<red>recover this kit."
            - "<dark_gray><st>------------------------"
        NO-PERMISSION:
          NAME: "<red>You don't have permission"
          MATERIAL: WOODEN_SWORD
        FILLER-ITEM-1:
          NAME: " "
          MATERIAL: RED_STAINED_GLASS_PANE
        FILLER-ITEM-2:
          NAME: " "
          MATERIAL: BLACK_STAINED_GLASS_PANE
    KIT-EDITOR:
      TITLE: "<dark_gray>Editing Kit %kit%" # Also available: %weightClass%
      ICONS:
        INFO:
          NAME: "<dark_green>Informations"
          MATERIAL: NAME_TAG
          LORE:
            - "<dark_gray><st>------------------------"
            - " <yellow>» <gray>Ladder: <yellow>%ladder%"
            - " <yellow>» <gray>Kit: <yellow>%kit%"
            - " <yellow>» <gray>WeightClass: <yellow>%weightClass%"
            - "<dark_gray><st>------------------------"
        SAVE:
          NAME: "<green><bold>Save"
          MATERIAL: LIME_WOOL
          LORE:
            - "<dark_gray><st>------------------------"
            - "<yellow><bold>Click here <yellow>to save"
            - "<yellow>the custom kit."
            - "<dark_gray><st>------------------------"
        LOAD-DEFAULT:
          NAME: "<yellow><bold>Load Default Kit"
          MATERIAL: YELLOW_WOOL
          LORE:
            - "<dark_gray><st>------------------------"
            - "<yellow><bold>Click here <yellow>to load the default"
            - "<yellow>kit to your inventory."
            - "<dark_gray><st>------------------------"
        CANCEL:
          NAME: "<red><bold>Cancel"
          MATERIAL: RED_WOOL
          LORE:
            - "<dark_gray><st>------------------------"
            - "<yellow><bold>Click here <yellow>to abort editing the"
            - "<yellow>kit, and return to the kit menu."
            - "<dark_gray><st>------------------------"
        FILLER-ITEM:
          NAME: " "
          MATERIAL: ORANGE_STAINED_GLASS_PANE
        SWITCH-TO-UNRANKED:
          NAME: "<green>Switch to %weightClass%"
          MATERIAL: WOODEN_SWORD
        SWITCH-TO-RANKED:
          NAME: "<green>Switch to %weightClass%"
          MATERIAL: IRON_SWORD
        ONLY-UNRANKED:
          NAME: "<red>This ladder is only %weightClass%"
          MATERIAL: REDSTONE
        ONLY-RANKED:
          NAME: "<red>This ladder is only %weightClass%"
          MATERIAL: REDSTONE
        NO-EFFECT:
          NAME: "<dark_purple>Effects"
          MATERIAL: POTION
          DAMAGE: 8233
          LORE:
            - "<dark_gray><st>------------------------"
            - "<gray>This ladder has no effects."
            - "<dark_gray><st>------------------------"
        HAS-EFFECT:
          FORMAT: "<light_purple>%name% %amplifier% <gray>for %time%"
          ICON:
            NAME: "<dark_purple>Effects"
            MATERIAL: POTION
            DAMAGE: 8233
            LORE:
              - "<dark_gray><st>------------------------"
              - "<yellow>You will get these effects,"
              - "<yellow>when the game starts."
              - ""
              - "%effects%"
              - "<dark_gray><st>------------------------"
  STATISTICS:
    SELECTOR:
      TITLE: "<red>Select statistics to view"
      ICONS:
        FILLER-ITEM:
          MATERIAL: BLACK_STAINED_GLASS_PANE
        OWN-PLAYER-STATS:
          NAME: "<red>%player% <gray>- <white>Statistic"
