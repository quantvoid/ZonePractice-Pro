          - " %color%┃ <white>Elo: %color%%current_elo%/%required_elo% <white>(%elo_progress_percent%%)"
          - " %color%┃ <white>Experience: %color%%current_exp%/%required_exp% <white>(%exp_progress_percent%%)"
          - ""
          - " %color%┃ <white>Progress: <green>%progress_bar% <white>(%progress_percent%%)"
          - ""
