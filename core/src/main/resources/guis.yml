          LORE:
            FORMAT: "<gold>%number%. %division% | %player%<dark_gray>: <yellow>%ladder_elo%"
            FORMAT-NULL: "<gold>%number%. <gray>| <red>N/A"
            LEADERBOARD:
              - "<dark_gray><st>------------------------"
              - "%top%"
              - "<dark_gray><st>------------------------"
            NO-LEADERBOARD:
              - "<dark_gray><st>------------------------"
              - "<red>There is no leaderboard to display"
              - "<dark_gray><st>------------------------"
