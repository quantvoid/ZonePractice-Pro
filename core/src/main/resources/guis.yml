            NO-LEADERBOARD:
              - "<dark_gray><st>------------------------"
              - "<red>There is no leaderboard to display"
              - "<dark_gray><st>------------------------"
    PLAYER-STATISTICS:
      TITLE: "<red>%player%'s <dark_gray>Stats"
      ICONS:
        FILLER-ITEM:
          NAME: " "
          MATERIAL: ORANGE_STAINED_GLASS_PANE
        BACK-TO-HUB:
          NAME: "<yellow>Back to hub"
          MATERIAL: ARROW
        ALL-STAT:
          NAME: "<red>%player% <gray>- <white>Statistics"
          LORE:
            - "<dark_gray><st>------------------------"
