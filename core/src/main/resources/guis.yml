            MEMBER-FORMAT: " <gray>- <aqua>%player%"
            LORE:
              - "<gray><st>------------------------"
              - "%members%"
              - ""
              - "<white><bold>Click here <white>to duel this party."
              - "<gray><st>------------------------"
  FFA:
