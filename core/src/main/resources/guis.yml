      TITLE: "<dark_gray>Select a <gold>ladder <dark_gray>to join"
      ICONS:
        LADDER:
          NAME: "%ladder%"
          LORE:
            - ""
            - "<green>Click here to select %ladder%<green>."
        FILLER:
          MATERIAL: ORANGE_STAINED_GLASS_PANE
