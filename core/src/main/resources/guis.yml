      TITLE: "<yellow>Top ELO Leaderboard"
      ICONS:
        FILLER-ITEM:
          NAME: " "
          MATERIAL: YELLOW_STAINED_GLASS_PANE
        BACK-TO-HUB:
          NAME: "<yellow>Back to hub"
          MATERIAL: ARROW
        REFRESH-ITEM:
          NAME: "<red>Refresh"
          MATERIAL: CLAY_BALL
          LORE:
            - "<dark_gray><st>------------------------"
            - "<gray>Click here to refresh"
            - "<gray>the leaderboard"
            - ""
