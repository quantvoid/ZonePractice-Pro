          - ""
          - " %color%┃ <white>Progress: <green>%progress_bar% <white>(%progress_percent%%)"
          - ""
          - " <red>┃ <white>This is your current division."
      NEXT-DIVISION:
        NAME: "%fullName%"
        LORE:
