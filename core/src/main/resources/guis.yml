            - "<yellow>Unranked Wins: <white>%unranked_wins%"
            - "<yellow>Unranked Losses: <white>%unranked_losses%"
            - "<yellow>Unranked W/L Ratio: <white>%unranked_w/l_ratio%"
            - "<dark_gray><st>------------------------"
        RANKED-LADDER-STATS:
          NAME: "%ladder%"
          LORE:
            - "<dark_gray><st>------------------------"
            - "<yellow>Ranked Wins: <white>%ranked_wins%"
