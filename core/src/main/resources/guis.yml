          NAME: "<yellow>Global Elo Leaderboard <gray>- <white>Top %number%"
          MATERIAL: "NETHER_STAR"
          LORE:
            FORMAT: "<gold>%number%. %division% | %player%<dark_gray>: <yellow>%global_elo%"
