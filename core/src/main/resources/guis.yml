  MATCH-HISTORY:
    # GUI title. %player% = the target player's name.
    TITLE: "<dark_gray>Match History <gray>- <gold>%player%"

    # Total number of slots. Must be a multiple of 9, max 54.
    SIZE: 27

    # When true, match items are automatically centred inside the GUI.
    # Set false to start them at slot 0 (or use START-SLOT).
    CENTER-ITEMS: true

    # Override the first item slot. Set to -1 to use CENTER-ITEMS logic.
    START-SLOT: -1

    # Filler item placed in every unused slot.
    FILLER-ITEM:
      MATERIAL: BLACK_STAINED_GLASS_PANE
      NAME: " "

    MATCH-ITEM:
      # Set to true to show the opponent's player head as the item.
      # Set to false to use MATERIAL instead.
      USE-PLAYER-HEAD: true

      # Fallback material used when USE-PLAYER-HEAD is false.
      MATERIAL: PAPER

      # Enchantment glow on the item when the viewer won this match.
      GLOW-ON-WIN: true

      # Item display name. Supports & colour codes.
      # Placeholders: %opponent% %result% %score% %kit% %arena%
      #               %player_health% %opponent_health% %duration% %date%
      NAME: "<yellow>Match vs <white>%opponent%"

      # Item lore. Supports & colour codes and the same placeholders.
      LORE:
        - "<dark_gray><st>--------------------"
        - "<gray>Result: %result%"
        - "<gray>Score: <white>%score%"
        - "<gray>Kit: <white>%kit%"
        - "<gray>Arena: <white>%arena%"
        - ""
        - "<gray>Your Health: %player_health%"
        - "<gray>Opp Health: %opponent_health%"
        - ""
        - "<gray>Duration: <white>%duration%"
        - "<gray>Played: <white>%date%"
        - "<dark_gray><st>--------------------"

    # Result label strings inserted into %result%.
    MESSAGES:
      WIN: "<green>Win"
      LOSS: "<red>Loss"
      DRAW: "<yellow>Draw"
